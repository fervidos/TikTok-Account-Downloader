<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium TikTok Viewer</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ff0050;
            /* TikTok Pink */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            /* Prevent native body scrolling */
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--glass-bg);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* The main scroll container */
        .video-feed {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .video-feed::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .video-feed {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* Individual Video Container */
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }

        /* The actual video / image element */
        .media-element {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Contain to show full media, use cover for true tiktok style but cuts off edges */
            background-color: #000;
        }

        /* Overlay UI Elements */
        .overlay-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 20px 40px 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            flex-direction: column;
            pointer-events: none;
            /* Let clicks pass through to video */
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            word-break: break-all;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-creator {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
        }

        .creator-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--accent-color);
            margin-right: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .video-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Play/Pause indicator (glassmorphism style) */
        .play-pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 80px;
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .play-pause-indicator.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 8px;
            /* Optical center */
        }

        /* Play Button requirement for auto-play block on first load */
        #start-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 30px;
        }

        #start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 80, 0.6);
        }

        #start-button:active {
            transform: translateY(2px);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .viewer-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }

        .viewer-button {
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: #fff;
            padding: 9px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .viewer-button:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        .viewer-counter {
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: #fff;
            padding: 9px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            min-width: 72px;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .viewer-hint {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 16px;
            z-index: 1000;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.45);
            border-radius: 999px;
            padding: 8px 12px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .filter-panel {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.45);
            border-radius: 999px;
            padding: 8px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .filter-control {
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 0.82rem;
            min-width: 120px;
        }

        .filter-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .filter-control option {
            color: #111;
        }

        .filter-button {
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: #fff;
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .filtered-empty {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            padding: 20px;
        }

        @media (max-width: 640px) {
            .viewer-controls {
                top: 10px;
                right: 10px;
            }

            .filter-panel {
                top: 10px;
                left: 10px;
                max-width: calc(100vw - 20px);
                overflow-x: auto;
                scrollbar-width: none;
            }

            .filter-panel::-webkit-scrollbar {
                display: none;
            }

            .viewer-button,
            .viewer-counter,
            .filter-control,
            .filter-button {
                padding: 8px 10px;
                font-size: 0.78rem;
            }

            .viewer-hint {
                font-size: 0.72rem;
                padding: 7px 10px;
            }
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>Loading _kept Media</h2>
        <button id="start-button" style="display: none;">Enter Viewer</button>
    </div>

    <div class="video-feed" id="feed">
        <!-- Videos will be injected here -->
    </div>

    <div class="filter-panel" id="filter-panel" style="display: none;">
        <select class="filter-control" id="creator-filter" aria-label="Filter by creator">
            <option value="">All creators</option>
        </select>
        <input class="filter-control" id="search-filter" type="text" placeholder="Search filename..." aria-label="Search videos" />
        <button class="filter-button" id="filter-apply" aria-label="Apply filters">Apply</button>
        <button class="filter-button" id="filter-clear" aria-label="Clear filters">Clear</button>
    </div>

    <div class="viewer-controls" id="viewer-controls" style="display: none;">
        <button class="viewer-button" id="mute-toggle" aria-label="Toggle mute">Mute: Off</button>
        <button class="viewer-button" id="fullscreen-toggle" aria-label="Toggle fullscreen">Fullscreen</button>
        <div class="viewer-counter" id="item-counter" aria-live="polite">0 / 0</div>
    </div>

    <div class="viewer-hint" id="viewer-hint" style="display: none;">
        Keys: Up/Down navigate, Space play/pause, M mute, F fullscreen
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const feedContainer = document.getElementById('feed');
            const loadingScreen = document.getElementById('loading-screen');
            const startButton = document.getElementById('start-button');
            const loadingText = loadingScreen.querySelector('h2');
            const spinner = loadingScreen.querySelector('.spinner');
            const viewerControls = document.getElementById('viewer-controls');
            const itemCounter = document.getElementById('item-counter');
            const muteToggle = document.getElementById('mute-toggle');
            const fullscreenToggle = document.getElementById('fullscreen-toggle');
            const viewerHint = document.getElementById('viewer-hint');
            const filterPanel = document.getElementById('filter-panel');
            const creatorFilter = document.getElementById('creator-filter');
            const searchFilter = document.getElementById('search-filter');
            const filterApply = document.getElementById('filter-apply');
            const filterClear = document.getElementById('filter-clear');

            let videosList = [];
            let isMuted = false; // Start unmuted, but require user interaction first
            let currentIndex = 1;
            let feedObserver = null;

            function getAllContainers() {
                return Array.from(document.querySelectorAll('.video-container'));
            }

            function getContainerAt(index) {
                const containers = getAllContainers();
                return containers[index - 1] || null;
            }

            function updateCounter(index) {
                currentIndex = Math.max(1, Math.min(index, videosList.length || 1));
                itemCounter.innerText = `${videosList.length ? currentIndex : 0} / ${videosList.length}`;
            }

            function syncMuteButton() {
                muteToggle.innerText = isMuted ? 'Mute: On' : 'Mute: Off';
            }

            function setMutedForAllVideos() {
                document.querySelectorAll('video').forEach(video => {
                    video.muted = isMuted;
                });
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.();
                } else {
                    document.exitFullscreen?.();
                }
            }

            function scrollToIndex(index) {
                const bounded = Math.max(1, Math.min(index, videosList.length));
                const container = getContainerAt(bounded);
                if (!container) return;
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                updateCounter(bounded);
            }

            function toggleCurrentVideoPlayback() {
                const container = getContainerAt(currentIndex);
                if (!container) return;
                const video = container.querySelector('video');
                const playIndicator = container.querySelector('.play-pause-indicator');
                if (!video) return;
                if (video.paused) {
                    video.play();
                    playIndicator?.classList.remove('show');
                } else {
                    video.pause();
                    playIndicator?.classList.add('show');
                }
            }

            function getFilterState() {
                return {
                    creator: creatorFilter.value.trim(),
                    q: searchFilter.value.trim(),
                };
            }

            function buildVideosApiUrl() {
                const params = new URLSearchParams();
                const state = getFilterState();
                if (state.creator) params.set('creator', state.creator);
                if (state.q) params.set('q', state.q);
                const qs = params.toString();
                return qs ? `/api/videos?${qs}` : '/api/videos';
            }

            async function fetchCreators() {
                try {
                    const response = await fetch('/api/creators');
                    if (!response.ok) return;
                    const data = await response.json();
                    creatorFilter.innerHTML = '<option value="">All creators</option>';
                    data.creators.forEach(creator => {
                        const opt = document.createElement('option');
                        opt.value = creator;
                        opt.textContent = `@${creator}`;
                        creatorFilter.appendChild(opt);
                    });
                } catch (_) {
                    // Best effort only; viewer still works without creator options.
                }
            }

            function showFilteredEmptyState() {
                feedContainer.innerHTML = `
                    <div class="filtered-empty">
                        <h2>No results for current filter</h2>
                        <p>Try another creator or clear the search query.</p>
                    </div>
                `;
            }

            async function refreshFeed() {
                try {
                    const response = await fetch(buildVideosApiUrl());
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    videosList = data.videos;

                    feedContainer.innerHTML = '';
                    if (feedObserver) {
                        feedObserver.disconnect();
                        feedObserver = null;
                    }

                    if (videosList.length === 0) {
                        showFilteredEmptyState();
                        updateCounter(0);
                        return;
                    }

                    renderVideos();
                    setupIntersectionObserver();
                    updateCounter(1);
                    scrollToIndex(1);
                } catch (error) {
                    console.error('Error refreshing feed:', error);
                }
            }

            // 1. Fetch the video list from API
            async function fetchVideos() {
                try {
                    const response = await fetch(buildVideosApiUrl());
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    videosList = data.videos;

                    if (videosList.length === 0) {
                        showEmptyState();
                        return;
                    }

                    // We have media, require user interaction to bypass autoplay restrictions
                    spinner.style.display = 'none';
                    loadingText.innerText = `Found ${videosList.length} items`;
                    startButton.style.display = 'block';

                } catch (error) {
                    console.error("Error fetching videos:", error);
                    loadingText.innerText = "Error loading videos :(";
                    spinner.style.display = 'none';
                }
            }

            // 2. Initialize the UI after user clicks Start
            startButton.addEventListener('click', () => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    renderVideos();
                    setupIntersectionObserver();
                    viewerControls.style.display = 'flex';
                    viewerHint.style.display = 'block';
                    filterPanel.style.display = 'flex';
                    updateCounter(1);
                    syncMuteButton();
                }, 500); // Wait for fade out
            });

            filterApply.addEventListener('click', () => {
                refreshFeed();
            });

            filterClear.addEventListener('click', () => {
                creatorFilter.value = '';
                searchFilter.value = '';
                refreshFeed();
            });

            searchFilter.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    refreshFeed();
                }
            });

            muteToggle.addEventListener('click', () => {
                isMuted = !isMuted;
                setMutedForAllVideos();
                syncMuteButton();
            });

            fullscreenToggle.addEventListener('click', () => {
                toggleFullscreen();
            });

            document.addEventListener('keydown', (event) => {
                if (loadingScreen.style.display !== 'none') return;

                if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    scrollToIndex(currentIndex + 1);
                } else if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    scrollToIndex(currentIndex - 1);
                } else if (event.key === ' ' || event.code === 'Space') {
                    event.preventDefault();
                    toggleCurrentVideoPlayback();
                } else if (event.key.toLowerCase() === 'm') {
                    isMuted = !isMuted;
                    setMutedForAllVideos();
                    syncMuteButton();
                } else if (event.key.toLowerCase() === 'f') {
                    toggleFullscreen();
                }
            });

            // Parse URL into meaningful creator and title
            function parseVideoPath(path) {
                // Example: creator_name/creator_name_20231201_7123456789_the_title_here.mp4
                const parts = path.split('/');
                let creator = "Unknown";
                let title = path;

                if (parts.length > 1) {
                    creator = parts[0];
                    title = parts[parts.length - 1]; // Just the file name
                } else {
                    title = parts[0];
                }

                // Clean up title (remove extension and try to make it readable)
                title = title.replace(/\.(mp4|webm|mkv|jpe?g|png|gif)$/i, '');

                // If it follows the standard yt-dlp format we used: uploader_date_id_title
                const titleParts = title.split('_');
                if (titleParts.length >= 4) {
                    // Rejoin the title part only
                    title = titleParts.slice(3).join(' ');
                }

                return { creator, title };
            }

            // 3. Render media elements (videos + photos)
            function renderVideos() {
                videosList.forEach((mediaPath, index) => {
                    const { creator, title } = parseVideoPath(mediaPath);
                    // Encode each part of the path to safely handle characters like '#' and '?' in filenames
                    const encodedPath = '/videos/' + mediaPath.split('/').map(encodeURIComponent).join('/');

                    const isVideo = /\.(mp4|webm|mkv)$/i.test(mediaPath);
                    const isImage = /\.(jpe?g|png|gif)$/i.test(mediaPath);

                    const container = document.createElement('div');
                    container.className = 'video-container';
                    container.dataset.index = String(index + 1);

                    // The media element (video or image)
                    let mediaElement;
                    if (isVideo) {
                        mediaElement = document.createElement('video');
                        mediaElement.src = encodedPath;
                        mediaElement.loop = true;
                        mediaElement.muted = isMuted; // Use global mute state
                        mediaElement.playsInline = true;
                        mediaElement.preload = index < 3 ? 'auto' : 'metadata'; // Preload first 3 heavily
                    } else {
                        mediaElement = document.createElement('img');
                        mediaElement.src = encodedPath;
                        mediaElement.alt = title || 'TikTok Media';
                        mediaElement.loading = index < 3 ? 'eager' : 'lazy';
                        mediaElement.decoding = 'async';
                    }
                    mediaElement.className = 'media-element';

                    // The overlay UI
                    const overlay = document.createElement('div');
                    overlay.className = 'overlay-ui';
                    overlay.innerHTML = `
                        <div class="video-creator">
                            <div class="creator-avatar">${creator.charAt(0).toUpperCase()}</div>
                            @${creator}
                        </div>
                        <div class="video-title">${title || 'TikTok Video'}</div>
                    `;

                    // Play/Pause indicator
                    const playIndicator = document.createElement('div');
                    playIndicator.className = 'play-pause-indicator';
                    playIndicator.innerHTML = '<div class="play-icon"></div>';

                    // Interaction logic (click to pause/play for videos only)
                    container.addEventListener('click', () => {
                        if (!isVideo) return;

                        if (mediaElement.paused) {
                            mediaElement.play();
                            playIndicator.classList.remove('show');
                        } else {
                            mediaElement.pause();
                            playIndicator.classList.add('show');
                        }
                    });

                    container.appendChild(mediaElement);
                    container.appendChild(overlay);
                    container.appendChild(playIndicator);
                    feedContainer.appendChild(container);
                });
            }

            // 4. Setup Intersection Observer for TikTok-style swipe play
            function setupIntersectionObserver() {
                const options = {
                    root: feedContainer, // The scrolling container
                    rootMargin: '0px',
                    threshold: 0.6 // Trigger when 60% of the video is visible
                };

                feedObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        const playIndicator = entry.target.querySelector('.play-pause-indicator');
                        const entryIndex = Number(entry.target.dataset.index || '1');

                        if (entry.isIntersecting) {
                            updateCounter(entryIndex);
                        }

                        if (!video) return;

                        if (entry.isIntersecting) {
                            // Video is in view, play it
                            const playPromise = video.play();
                            if (playPromise !== undefined) {
                                playPromise.catch(error => {
                                    console.log("Auto-play prevented", error);
                                    // If autoplay fails, we might need to show the play button
                                    playIndicator.classList.add('show');
                                });
                            }
                            playIndicator.classList.remove('show');
                        } else {
                            // Video is out of view, pause it and reset to beginning
                            video.pause();
                            video.currentTime = 0;
                            playIndicator.classList.remove('show');
                        }
                    });
                }, options);

                // Observe all video containers
                document.querySelectorAll('.video-container').forEach(container => {
                    feedObserver.observe(container);
                });
            }

            function showEmptyState() {
                loadingScreen.style.display = 'none';
                feedContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📁</div>
                        <h2>No media found</h2>
                        <p>The _kept folder is currently empty.</p>
                    </div>
                `;
            }

            // Kickoff
            fetchCreators();
            fetchVideos();
        });
    </script>
</body>

</html>
